<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>벙커 벌금</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Apple SD Gothic Neo',sans-serif;background:#1a3a2a;min-height:100vh;padding-bottom:70px;font-size:14px}
header{background:linear-gradient(160deg,#2d5a3d,#1a3a2a);padding:16px;text-align:center;border-bottom:3px solid #b8946a}
.title{font-size:1.3rem;font-weight:900;color:#fafaf8;margin-top:4px}
.badge{display:inline-block;background:#c9922a;color:white;font-size:.72rem;font-weight:700;padding:3px 12px;border-radius:20px;margin-top:6px}
.sync-bar{font-size:.72rem;text-align:center;padding:4px;background:#0a1f12;color:#4adc8c}
.sync-bar.err{color:#e74c3c;background:#1f0a0a}
.room-bar{background:#0f2518;padding:8px 14px;display:flex;align-items:center;justify-content:space-between}
.room-info{color:#d4b896;font-size:.75rem;font-weight:700}
.room-info span{color:#4adc8c;letter-spacing:2px}
.btn-share{background:#c9922a;color:white;border:none;border-radius:8px;padding:5px 12px;font-size:.75rem;font-weight:700;cursor:pointer}

/* 탭 */
.tab-bar{display:flex;background:#0f2518;border-bottom:2px solid #2d5a3d}
.tab{flex:1;padding:9px 4px;text-align:center;color:#5a7a62;font-size:.78rem;font-weight:700;cursor:pointer;border:none;background:none;line-height:1.3}
.tab.active{color:#4adc8c;border-bottom:2px solid #4adc8c;margin-bottom:-2px}

main{padding:12px;max-width:560px;margin:0 auto}
.section{display:none}
.section.active{display:block}

/* 공통 버튼 */
.btn-green{background:#2d5a3d;color:white;border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:.82rem;cursor:pointer;font-family:inherit}
.btn-dark{background:#1a3a2a;color:white;border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:.82rem;cursor:pointer;font-family:inherit}
.btn-red{background:none;border:1.5px solid #e74c3c;color:#e74c3c;border-radius:8px;padding:5px 10px;font-size:.75rem;cursor:pointer;font-family:inherit}
.btn-save{width:100%;background:#c9922a;color:white;border:none;border-radius:10px;padding:13px;font-weight:900;font-size:1rem;cursor:pointer;margin-top:12px;font-family:inherit;letter-spacing:.5px}

/* 카드 공통 */
.card{background:#fafaf8;border-radius:14px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.18);margin-bottom:12px}
.card-head{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:#f0f7f2;border-bottom:1px solid #dde8df}
.card-title{font-weight:700;color:#1a3a2a;font-size:.9rem}
.card-body{padding:12px 14px}

/* 게임 기록 탭 */
.row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.row label{color:#2d5a3d;font-size:.78rem;font-weight:700;white-space:nowrap;min-width:52px}
input[type=date]{flex:1;border:1.5px solid #4a8c5c;border-radius:8px;padding:7px 10px;font-size:.88rem;outline:none;font-family:inherit;background:white}
input[type=number]{border:1.5px solid #4a8c5c;border-radius:8px;padding:7px 10px;font-size:.88rem;outline:none;font-family:inherit;background:white;width:100px}
input[type=text]{border:1.5px solid #4a8c5c;border-radius:8px;padding:7px 10px;font-size:.88rem;outline:none;font-family:inherit;background:white;flex:1}
.btn-today{background:#1a3a2a;color:white;border:none;border-radius:8px;padding:7px 10px;font-size:.75rem;font-weight:700;cursor:pointer;white-space:nowrap}

/* 참석자 체크리스트 */
.member-checklist{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.member-chip{display:flex;align-items:center;gap:5px;background:#e8f5ec;border:2px solid #b8d4bf;border-radius:20px;padding:5px 12px;cursor:pointer;user-select:none;font-size:.82rem;font-weight:600;color:#2d5a3d;transition:all .15s}
.member-chip.checked{background:#2d5a3d;border-color:#2d5a3d;color:white}

/* 멤버 벌금 입력 */
.member-fine-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0}
.member-fine-row:last-child{border-bottom:none}
.mf-name{font-weight:700;color:#1a3a2a;font-size:.88rem;flex:1}
.mf-count{display:flex;align-items:center;gap:6px}
.cell-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.cell{width:40px;height:40px;border-radius:8px;border:2px solid #d4b896;background:#f5ede2;display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer;user-select:none}
.cell.on{border-color:#b8946a;background:#d4b896}
.mf-total{font-weight:700;color:#c0392b;font-size:.85rem;min-width:60px;text-align:right}

/* 저장된 게임 목록 */
.game-item{background:#fafaf8;border-radius:12px;padding:12px 14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.game-item-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.game-item-title{font-weight:700;color:#1a3a2a;font-size:.88rem}
.game-item-fine{font-size:.75rem;color:#6b8c73;font-weight:600}
.game-item-rows{display:flex;flex-direction:column;gap:3px}
.game-row{display:flex;justify-content:space-between;font-size:.82rem}
.game-row-name{color:#2d5a3d;font-weight:600}
.game-row-amt{color:#c0392b;font-weight:700}
.game-item-total{margin-top:8px;padding-top:6px;border-top:1px solid #e8f0ea;display:flex;justify-content:space-between;font-size:.82rem;font-weight:700;color:#1a3a2a}
.game-item-del{background:none;border:none;color:#ccc;font-size:1rem;cursor:pointer;padding:0 4px}

/* 날짜 그룹 */
.date-group{margin-bottom:16px}
.date-group-title{font-size:.78rem;font-weight:700;color:#4adc8c;margin-bottom:8px;padding:4px 8px;background:#0f2518;border-radius:6px;display:inline-block}

/* 회원 관리 탭 */
.member-list-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fafaf8;border-radius:10px;margin-bottom:8px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.member-list-name{font-weight:700;color:#1a3a2a;font-size:.9rem}
.add-member-row{display:flex;gap:8px;margin-bottom:12px}

/* 누적 조회 탭 */
.period-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.period-row label{font-size:.78rem;font-weight:700;color:#2d5a3d;white-space:nowrap}
.stat-card{background:#fafaf8;border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.stat-name{font-weight:700;color:#1a3a2a;font-size:.92rem;margin-bottom:6px}
.stat-rows{display:flex;flex-direction:column;gap:3px}
.stat-row{display:flex;justify-content:space-between;font-size:.8rem;color:#6b8c73}
.stat-total{display:flex;justify-content:space-between;margin-top:6px;padding-top:6px;border-top:1px solid #e8f0ea;font-weight:700;font-size:.88rem;color:#c0392b}

/* 요약 바 */
.summary-bar{background:linear-gradient(135deg,#1a3a2a,#0f2518);border-radius:14px;padding:14px 18px;margin-top:12px;display:flex;justify-content:space-between;align-items:center}
.sum-label{font-size:.75rem;color:#d4b896;margin-bottom:2px}
.sum-total{font-size:1.6rem;font-weight:900;color:#c9922a}
.sum-right{text-align:right;color:#8fb898;font-size:.82rem}

.empty{text-align:center;padding:30px 20px;color:#5a7a62;font-size:.88rem}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a3a2a;color:white;padding:9px 20px;border-radius:30px;font-size:.82rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.3);z-index:999;white-space:nowrap;transition:transform .25s}
.toast.show{transform:translateX(-50%) translateY(0)}
.section-title{font-size:.78rem;font-weight:700;color:#4adc8c;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #2d5a3d}
</style>
</head>
<body>

<header>
  <div style="font-size:1.8rem">⛳</div>
  <div class="title">벙커 벌금 기록판</div>
  <div class="badge" id="fineRateBadge">1회 = 500원</div>
</header>
<div class="sync-bar" id="syncBar">● Firebase 연결 중...</div>
<div class="room-bar">
  <div class="room-info">방 코드: <span id="roomCodeDisplay">-</span></div>
  <button class="btn-share" onclick="shareRoom()">🔗 링크 공유</button>
</div>

<div class="tab-bar">
  <button class="tab active" id="tab-record" onclick="switchTab('record')">📝 게임기록</button>
  <button class="tab" id="tab-history" onclick="switchTab('history')">📅 기록조회</button>
  <button class="tab" id="tab-stat" onclick="switchTab('stat')">📊 누적조회</button>
  <button class="tab" id="tab-members" onclick="switchTab('members')">👥 회원관리</button>
</div>

<main>

  <!-- ① 게임 기록 탭 -->
  <div class="section active" id="section-record">
    <div class="card">
      <div class="card-head"><div class="card-title">🏌️ 새 게임 기록</div></div>
      <div class="card-body">
        <div class="row">
          <label>📅 날짜</label>
          <input type="date" id="recDate">
          <button class="btn-today" onclick="setRecToday()">오늘</button>
        </div>
        <div class="row">
          <label>💰 벌금</label>
          <input type="number" id="recFine" value="500" min="0" step="100" style="width:100px">
          <span style="color:#6b8c73;font-size:.8rem">원 / 1회</span>
        </div>
        <div class="row">
          <label>📝 메모</label>
          <input type="text" id="recMemo" placeholder="예) 오전 라운드">
        </div>

        <div class="section-title" style="margin-top:4px">참석자 선택</div>
        <div class="member-checklist" id="memberChecklist">
          <div style="color:#aaa;font-size:.82rem">회원관리 탭에서 회원을 먼저 추가하세요</div>
        </div>

        <div id="fineInputArea"></div>

        <button class="btn-save" onclick="saveGame()">💾 이 게임 저장</button>
      </div>
    </div>
  </div>

  <!-- ② 기록 조회 탭 -->
  <div class="section" id="section-history">
    <div id="historyList"><div class="empty">저장된 기록이 없습니다.</div></div>
  </div>

  <!-- ③ 누적 조회 탭 -->
  <div class="section" id="section-stat">
    <div class="card">
      <div class="card-head"><div class="card-title">📊 기간별 누적 벌금</div></div>
      <div class="card-body">
        <div class="period-row">
          <label>시작</label>
          <input type="date" id="statFrom" style="flex:1">
          <label>종료</label>
          <input type="date" id="statTo" style="flex:1">
        </div>
        <button class="btn-dark" onclick="renderStat()" style="width:100%;margin-top:4px">조회하기</button>
      </div>
    </div>
    <div id="statResult"><div class="empty">기간을 설정하고 조회하세요.</div></div>
  </div>

  <!-- ④ 회원 관리 탭 -->
  <div class="section" id="section-members">
    <div class="card">
      <div class="card-head"><div class="card-title">👥 회원 추가</div></div>
      <div class="card-body">
        <div class="add-member-row">
          <input type="text" id="memberNameInp" placeholder="이름 입력" maxlength="8" onkeyup="checkMemberEnter(event)">
          <button class="btn-dark" onclick="addMemberToList()">추가</button>
        </div>
      </div>
    </div>
    <div id="memberListUI"></div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyCPQNVD0NO7V1AHCcFgo2DCggvRJR6P3dw",
  authDomain: "bunker-golf-doremi.firebaseapp.com",
  databaseURL: "https://bunker-golf-doremi-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bunker-golf-doremi",
  storageBucket: "bunker-golf-doremi.firebasestorage.app",
  messagingSenderId: "1039212871468",
  appId: "1:1039212871468:web:c1c545f18f6f8a3516f689"
};

var db = null;
var roomCode = '';
// allMembers: [{name}]
// games: [{id, date, finePerCount, memo, members:[{name,count}]}]
var allMembers = [];
var games = [];
var checkedMembers = {}; // name -> bool
var memberCounts = {};   // name -> count (현재 입력 중)
var MAX = 24;

// ── 초기화 ───────────────────────────────────────
function init() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    setSyncBar(true);
  } catch(e) {
    setSyncBar(false);
    return;
  }
  var params = getUrlParams();
  roomCode = params['room'] ? params['room'] : makeRoomCode();
  updateUrlRoom(roomCode);
  document.getElementById('roomCodeDisplay').textContent = roomCode;

  setRecToday();
  setStatPeriod();
  listenFirebase();
}

function setSyncBar(ok) {
  var bar = document.getElementById('syncBar');
  bar.textContent = ok ? '● 실시간 동기화 연결됨' : '● 연결 실패';
  bar.className = ok ? 'sync-bar' : 'sync-bar err';
}

function makeRoomCode() {
  var c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789', r = '';
  for (var i=0;i<6;i++) r += c[Math.floor(Math.random()*c.length)];
  return r;
}
function getUrlParams() {
  var res={};
  try{var s=window.location.search.substring(1),p=s.split('&');for(var i=0;i<p.length;i++){var kv=p[i].split('=');if(kv[0])res[decodeURIComponent(kv[0])]=decodeURIComponent(kv[1]||'');}}catch(e){}
  return res;
}
function updateUrlRoom(code) {
  try{if(window.history&&window.history.replaceState)window.history.replaceState({},'',window.location.pathname+'?room='+code);}catch(e){}
}

// ── Firebase ──────────────────────────────────────
function listenFirebase() {
  db.ref('rooms/'+roomCode).on('value', function(snap) {
    try {
      var val = snap.val() || {};
      allMembers = toArray(val.members);
      games = toArray(val.games);
      renderMemberChecklist();
      renderMemberList();
    } catch(e) {}
  }, function() { setSyncBar(false); });
}

function toArray(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val.filter(function(x){return x;});
  var arr=[];
  for(var k in val){if(val.hasOwnProperty(k)&&val[k])arr.push(val[k]);}
  return arr;
}

function saveMembers() {
  if (!db) return;
  db.ref('rooms/'+roomCode+'/members').set(allMembers);
}
function saveGames() {
  if (!db) return;
  db.ref('rooms/'+roomCode+'/games').set(games);
}

// ── 날짜 ─────────────────────────────────────────
function setRecToday() {
  var now = new Date();
  document.getElementById('recDate').value = toDateStr(now);
}
function toDateStr(d) {
  var m=d.getMonth()+1, dd=d.getDate();
  return d.getFullYear()+'-'+(m<10?'0'+m:m)+'-'+(dd<10?'0'+dd:dd);
}
function setStatPeriod() {
  var now = new Date();
  var firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
  document.getElementById('statFrom').value = toDateStr(firstDay);
  document.getElementById('statTo').value = toDateStr(now);
}

// ── 회원 관리 ─────────────────────────────────────
function checkMemberEnter(e) {
  if (e.keyCode===13||e.key==='Enter') addMemberToList();
}
function addMemberToList() {
  var inp = document.getElementById('memberNameInp');
  var name = inp.value.replace(/^\s+|\s+$/g,'');
  if (!name) { showToast('이름을 입력하세요'); return; }
  for (var i=0;i<allMembers.length;i++) {
    if (allMembers[i].name===name){showToast('이미 있는 이름');return;}
  }
  allMembers.push({name:name});
  inp.value='';
  inp.blur();
  saveMembers();
  renderMemberList();
  renderMemberChecklist();
  showToast(name+' 추가됨!');
}
function deleteMemberFromList(idx) {
  var name = allMembers[idx].name;
  allMembers.splice(idx,1);
  saveMembers();
  renderMemberList();
  renderMemberChecklist();
  showToast(name+' 삭제됨');
}
function renderMemberList() {
  var div = document.getElementById('memberListUI');
  if (allMembers.length===0){div.innerHTML='<div class="empty">등록된 회원이 없습니다.</div>';return;}
  var html='';
  for(var i=0;i<allMembers.length;i++){
    html+='<div class="member-list-item">'+
      '<div class="member-list-name">🏌️ '+allMembers[i].name+'</div>'+
      '<button class="btn-red" onclick="deleteMemberFromList('+i+')">삭제</button>'+
    '</div>';
  }
  div.innerHTML=html;
}

// ── 게임 기록 탭 ──────────────────────────────────
function renderMemberChecklist() {
  var div = document.getElementById('memberChecklist');
  if (allMembers.length===0){
    div.innerHTML='<div style="color:#aaa;font-size:.82rem">회원관리 탭에서 회원을 먼저 추가하세요</div>';
    renderFineInputArea();
    return;
  }
  var html='';
  for(var i=0;i<allMembers.length;i++){
    var name=allMembers[i].name;
    var cls=checkedMembers[name]?'member-chip checked':'member-chip';
    html+='<div class="'+cls+'" onclick="toggleChip(\''+name+'\')">'+(checkedMembers[name]?'✓ ':'')+name+'</div>';
  }
  div.innerHTML=html;
  renderFineInputArea();
}

function toggleChip(name) {
  checkedMembers[name] = !checkedMembers[name];
  if (!checkedMembers[name]) delete memberCounts[name];
  else memberCounts[name] = memberCounts[name]||0;
  renderMemberChecklist();
}

function renderFineInputArea() {
  var div = document.getElementById('fineInputArea');
  var selected=[];
  for(var k in checkedMembers){if(checkedMembers[k])selected.push(k);}
  if(selected.length===0){div.innerHTML='';return;}
  var html='<div class="section-title" style="margin-top:10px">벙커 횟수 입력</div>';
  for(var i=0;i<selected.length;i++){
    var name=selected[i];
    var cnt=memberCounts[name]||0;
    var gridHTML='';
    for(var j=0;j<MAX;j++){
      var isOn=(j<cnt);
      gridHTML+='<div class="cell'+(isOn?' on':'')+'" onclick="toggleCell(\''+name+'\','+j+')">'+(isOn?'⛳':'')+'</div>';
    }
    var fine=parseInt(document.getElementById('recFine').value)||500;
    html+='<div style="margin-bottom:12px">'+
      '<div class="member-fine-row">'+
        '<div class="mf-name">🏌️ '+name+'</div>'+
        '<div class="mf-total">'+cnt+'회 ₩'+(cnt*fine).toLocaleString()+'</div>'+
      '</div>'+
      '<div class="cell-grid">'+gridHTML+'</div>'+
    '</div>';
  }
  div.innerHTML=html;
}

function toggleCell(name, ci) {
  var cnt = memberCounts[name]||0;
  if (ci===cnt-1) memberCounts[name]=Math.max(0,cnt-1);
  else if (ci>=cnt) memberCounts[name]=Math.min(MAX,cnt+1);
  renderFineInputArea();
}

// ── 게임 저장 ─────────────────────────────────────
function saveGame() {
  var date = document.getElementById('recDate').value;
  var finePerCount = parseInt(document.getElementById('recFine').value)||500;
  var memo = document.getElementById('recMemo').value.replace(/^\s+|\s+$/g,'')||'';

  var selected=[];
  for(var k in checkedMembers){if(checkedMembers[k])selected.push(k);}
  if(!date){showToast('날짜를 선택하세요');return;}
  if(selected.length===0){showToast('참석자를 선택하세요');return;}

  var members=[];
  for(var i=0;i<selected.length;i++){
    members.push({name:selected[i], count:memberCounts[selected[i]]||0});
  }

  var game={
    id: Date.now().toString(),
    date: date,
    finePerCount: finePerCount,
    memo: memo,
    members: members
  };
  games.push(game);
  saveGames();

  // 초기화
  checkedMembers={};
  memberCounts={};
  document.getElementById('recMemo').value='';
  renderMemberChecklist();
  showToast('게임 저장 완료! 💾');
}

// ── 기록 조회 탭 ──────────────────────────────────
function renderHistory() {
  var div = document.getElementById('historyList');
  if(games.length===0){div.innerHTML='<div class="empty">저장된 기록이 없습니다.</div>';return;}

  // 날짜별 그룹
  var grouped={};
  for(var i=0;i<games.length;i++){
    var g=games[i];
    if(!grouped[g.date])grouped[g.date]=[];
    grouped[g.date].push(g);
  }
  var dates=[];
  for(var d in grouped){if(grouped.hasOwnProperty(d))dates.push(d);}
  dates.sort(function(a,b){return a<b?1:-1;});

  var html='';
  for(var di=0;di<dates.length;di++){
    var date=dates[di];
    var dayGames=grouped[date];
    html+='<div class="date-group"><div class="date-group-title">📅 '+date+'</div>';
    for(var gi=0;gi<dayGames.length;gi++){
      var g=dayGames[gi];
      var gIdx=indexOfGame(g.id);
      var members=g.members||[];
      var dayTotal=0;
      var rowsHTML='';
      for(var mi=0;mi<members.length;mi++){
        var m=members[mi];
        dayTotal+=m.count;
        rowsHTML+='<div class="game-row"><span class="game-row-name">🏌️ '+m.name+'</span><span class="game-row-amt">'+m.count+'회 ₩'+(m.count*g.finePerCount).toLocaleString()+'</span></div>';
      }
      var memoTxt=g.memo?(' · '+g.memo):'';
      html+='<div class="game-item">'+
        '<div class="game-item-head">'+
          '<div>'+
            '<div class="game-item-title">게임 '+(gi+1)+memoTxt+'</div>'+
            '<div class="game-item-fine">1회 = '+g.finePerCount.toLocaleString()+'원</div>'+
          '</div>'+
          '<button class="game-item-del" onclick="deleteGame(\''+g.id+'\')">🗑</button>'+
        '</div>'+
        '<div class="game-item-rows">'+rowsHTML+'</div>'+
        '<div class="game-item-total"><span>총 '+dayTotal+'회</span><span>₩'+(dayTotal*g.finePerCount).toLocaleString()+'</span></div>'+
      '</div>';
    }
    html+='</div>';
  }
  div.innerHTML=html;
}

function indexOfGame(id) {
  for(var i=0;i<games.length;i++){if(games[i].id===id)return i;}
  return -1;
}
function deleteGame(id) {
  if(!confirm('이 게임 기록을 삭제할까요?'))return;
  var idx=indexOfGame(id);
  if(idx>=0){games.splice(idx,1);saveGames();renderHistory();showToast('삭제됨');}
}

// ── 누적 조회 탭 ──────────────────────────────────
function renderStat() {
  var from=document.getElementById('statFrom').value;
  var to=document.getElementById('statTo').value;
  var div=document.getElementById('statResult');
  if(!from||!to){div.innerHTML='<div class="empty">기간을 입력하세요</div>';return;}

  // 기간 내 게임 필터
  var filtered=[];
  for(var i=0;i<games.length;i++){
    if(games[i].date>=from&&games[i].date<=to)filtered.push(games[i]);
  }
  if(filtered.length===0){div.innerHTML='<div class="empty">해당 기간에 기록이 없습니다.</div>';return;}

  // 회원별 집계
  var statMap={}; // name -> [{date,memo,count,finePerCount}]
  for(var i=0;i<filtered.length;i++){
    var g=filtered[i];
    var mems=g.members||[];
    for(var mi=0;mi<mems.length;mi++){
      var m=mems[mi];
      if(!statMap[m.name])statMap[m.name]=[];
      statMap[m.name].push({date:g.date,memo:g.memo||'',count:m.count,finePerCount:g.finePerCount});
    }
  }

  var names=[];
  for(var n in statMap){if(statMap.hasOwnProperty(n))names.push(n);}
  names.sort();

  // 전체 합계
  var grandTotal=0;
  var html='';
  for(var ni=0;ni<names.length;ni++){
    var name=names[ni];
    var rows=statMap[name];
    var total=0;
    var rowHTML='';
    for(var ri=0;ri<rows.length;ri++){
      var r=rows[ri];
      var amt=r.count*r.finePerCount;
      total+=amt;
      var memoTxt=r.memo?(' ('+r.memo+')'):'';
      rowHTML+='<div class="stat-row"><span>'+r.date+memoTxt+'</span><span>'+r.count+'회 ₩'+amt.toLocaleString()+'</span></div>';
    }
    grandTotal+=total;
    html+='<div class="stat-card">'+
      '<div class="stat-name">🏌️ '+name+'</div>'+
      '<div class="stat-rows">'+rowHTML+'</div>'+
      '<div class="stat-total"><span>누적 벌금</span><span>₩'+total.toLocaleString()+'</span></div>'+
    '</div>';
  }

  // 전체 합계 바
  html+='<div class="summary-bar">'+
    '<div><div class="sum-label">'+from+' ~ '+to+'</div><div class="sum-total">₩'+grandTotal.toLocaleString()+'</div></div>'+
    '<div class="sum-right">총 게임 <strong style="color:white">'+filtered.length+'</strong>회</div>'+
  '</div>';

  div.innerHTML=html;
}

// ── 공유 ──────────────────────────────────────────
function shareRoom() {
  try {
    var url=window.location.href.split('?')[0]+'?room='+roomCode;
    if(navigator.share){navigator.share({title:'벙커 벌금 기록판',text:'방 코드: '+roomCode,url:url});}
    else if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(function(){showToast('링크 복사됨! 카톡으로 공유 🔗');});}
    else{prompt('링크를 복사하세요:',url);}
  } catch(e){prompt('링크:',window.location.href.split('?')[0]+'?room='+roomCode);}
}

// ── 탭 전환 ──────────────────────────────────────
function switchTab(tab) {
  var tabs=['record','history','stat','members'];
  for(var i=0;i<tabs.length;i++){
    document.getElementById('tab-'+tabs[i]).className='tab'+(tabs[i]===tab?' active':'');
    document.getElementById('section-'+tabs[i]).className='section'+(tabs[i]===tab?' active':'');
  }
  if(tab==='history')renderHistory();
  if(tab==='stat')renderStat();
  if(tab==='members')renderMemberList();
}

// ── 토스트 ────────────────────────────────────────
function showToast(msg) {
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}

window.onload=function(){init();};
</script>
